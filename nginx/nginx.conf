worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting for admin auth endpoints
    limit_req_zone $binary_remote_addr zone=admin_auth:10m rate=5r/m;

    upstream api_backend {
        server api:8000;
    }

    upstream admin_frontend_up {
        server admin_frontend:80;
    }

    upstream public_frontend_up {
        server public_frontend:80;
    }

    upstream grafana_up {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name _;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # ─── Admin Panel ───────────────────────────────────────
        location /admin {
            proxy_pass http://admin_frontend_up;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Admin Auth Rate Limiting ──────────────────────────
        location /api/admin/auth {
            limit_req zone=admin_auth burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── API ───────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ─── Socket.IO ────────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Grafana ──────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana_up/;
            proxy_set_header Host $host;
        }

        # ─── Public cached endpoints ──────────────────────────
        location /api/public/ {
            proxy_pass http://api_backend;
            proxy_cache_valid 200 5m;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ─── Public Dashboard (default) ───────────────────────
        location / {
            proxy_pass http://public_frontend_up;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
