global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "celery"
    static_configs:
      - targets: ["celery_worker_satellite:9808", "celery_worker_inference:9808", "celery_worker_drone:9808", "celery_worker_filing:9808"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "node"
    static_configs:
      - targets: ["api:8000"]
